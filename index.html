<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tabicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pillo — Aplikacja do zarządzania lekami</title>
    <meta name="description" content="Pillo pomaga pacjentom i opiekunom zarządzać lekami, ustawiać przypomnienia i śledzić harmonogram przyjmowania. Pobierz za darmo." />
    <!-- Preconnect to Google Fonts to speed up DNS + TLS handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts as non-render-blocking stylesheet (replaces @import in CSS) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" />
    <!-- Preload LCP hero image (patient is default role) -->
    <link rel="preload" as="image" href="/images/hero/hero_patient.webp" fetchpriority="high" />
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #f8f9f7;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #page-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #page-loader img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        animation: loader-pulse 1.6s ease-in-out infinite;
      }
      #page-loader .loader-bar {
        width: 120px;
        height: 3px;
        background: #d8e8e2;
        border-radius: 99px;
        overflow: hidden;
      }
      #page-loader .loader-bar-fill {
        height: 100%;
        width: 40%;
        background: #5DB38D;
        border-radius: 99px;
        animation: loader-slide 1.4s ease-in-out infinite;
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.93); }
      }
      @keyframes loader-slide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(150%); }
        100% { transform: translateX(150%); }
      }
    </style>
  </head>
  <body>
    <script>window.__loaderStart = Date.now();</script>
    <div id="page-loader">
      <img src="/images/logo/Pillo_logo_A.png" alt="Pillo" />
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
